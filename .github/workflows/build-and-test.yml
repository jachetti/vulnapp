name: Build and Test VulnApp

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Verify Go modules
        run: go mod verify

      - name: Test attack scripts
        run: |
          chmod +x bin/existing/*.sh bin/modern/*.sh
          ./bin/existing/Execution_via_Command-Line_Interface.sh
          ./bin/modern/Docker_Socket_Exploitation.sh

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check build output
        run: |
          if [ ! -d "frontend/dist" ]; then
            echo "Frontend build failed - dist directory not found"
            exit 1
          fi
          echo "Frontend build successful"
          ls -la frontend/dist/

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: vulnapp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker build -t vulnapp:test .
          docker run -d --name vulnapp-test -p 80:80 vulnapp:test
          sleep 10

          # Test health endpoint
          curl -f http://localhost/api/health || exit 1

          # Test attacks endpoint
          ATTACK_COUNT=$(curl -s http://localhost/api/attacks | jq -r '.count')
          if [ "$ATTACK_COUNT" != "24" ]; then
            echo "Expected 24 attacks, got $ATTACK_COUNT"
            exit 1
          fi

          echo "Docker image tests passed"
          docker rm -f vulnapp-test

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
