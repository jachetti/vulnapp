# ⚠️  WARNING: INTENTIONALLY VULNERABLE CONFIGURATION ⚠️
# This manifest contains dangerous misconfigurations for training purposes
# ONLY deploy in isolated lab environments - NEVER in production!
#
# Vulnerabilities included:
# - Privileged mode (enables container escape)
# - Docker socket mount (full host access)
# - Host filesystem mount (backdoor installation)
# - Dangerous capabilities (SYS_ADMIN, SYS_PTRACE, DAC_READ_SEARCH)
#
# kubectl apply -f vulnerable.example.yaml
# kubectl get service vulnerable-example-com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable.example.com
spec:
  selector:
   matchLabels:
      run: vulnerable.example.com
  replicas: 1
  template:
    metadata:
      labels:
        run: vulnerable.example.com
    spec:
      containers:
          - name: vulnapp
            image: quay.io/crowdstrike/vulnapp:2.0.0
            imagePullPolicy: Always
            command:
              - "/entrypoint.sh"
            ports:
             - containerPort: 80
               name: web
            # ⚠️ DANGEROUS: Privileged mode for container escape scenarios
            securityContext:
              privileged: true
              capabilities:
                add:
                  - SYS_ADMIN        # Dangerous: Allows mount operations
                  - SYS_PTRACE       # Dangerous: Allows process injection
                  - DAC_READ_SEARCH  # Dangerous: Bypasses file permissions
            # ⚠️ DANGEROUS: Volume mounts for exploitation scenarios
            volumeMounts:
              - name: docker-socket
                mountPath: /var/run/docker.sock
              - name: host-root
                mountPath: /host
      volumes:
        # ⚠️ DANGEROUS: Docker socket access (full host control)
        - name: docker-socket
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        # ⚠️ DANGEROUS: Host filesystem access (backdoor installation)
        - name: host-root
          hostPath:
            path: /
            type: Directory

---
apiVersion: v1
kind: Service
metadata:
  name: vulnerable-example-com
spec:
  selector:
    run: vulnerable.example.com
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
